<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ROME — Vampire Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #000;
        color: #fff;
        font-family: "IM Fell English", serif;
        overflow: hidden;
    }

    /* Intro Screen */
    #intro {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        gap: 20px;
    }

    #intro h1 {
        font-family: "UnifrakturCook", cursive;
        font-size: 4rem;
        letter-spacing: 4px;
    }

    #intro p {
        font-size: 1.2rem;
        opacity: 0.8;
    }

    #enterPrompt {
        font-size: 1rem;
        opacity: 0.6;
        animation: blink 1.2s infinite;
    }

    @keyframes blink {
        0% { opacity: 0.2; }
        50% { opacity: 1; }
        100% { opacity: 0.2; }
    }

    /* Main Content */
    #main {
        display: none;
        padding: 40px;
        text-align: center;
    }

    .title {
        font-family: "UnifrakturCook", cursive;
        font-size: 3.5rem;
        margin-bottom: 20px;
    }

    .subtitle {
        font-size: 1.3rem;
        margin-bottom: 40px;
        opacity: 0.8;
    }

    .product-card {
        border: 1px solid #444;
        padding: 30px;
        max-width: 600px;
        margin: 0 auto;
        background: #0a0a0a;
        border-radius: 8px;
    }

    .price {
        margin-top: 20px;
        font-size: 1.4rem;
    }

    .old-price {
        text-decoration: line-through;
        opacity: 0.5;
        font-size: 1rem;
    }

    .sale {
        color: #ff0000;
        font-size: 1.2rem;
        margin-top: 5px;
    }

    .btn {
        margin-top: 30px;
        padding: 12px 25px;
        border: 1px solid #fff;
        background: transparent;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 2px;
    }

    .btn:hover {
        background: #fff;
        color: #000;
    }

    /* Rickroll Frame */
    #rickroll {
        margin-top: 40px;
        display: none;
    }

    iframe {
        width: 100%;
        max-width: 700px;
        height: 400px;
        border: none;
    }
</style>

<script>
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            document.getElementById("intro").style.display = "none";
            document.getElementById("main").style.display = "block";
        }
    });

    function showVideo() {
        document.getElementById("rickroll").style.display = "block";
    }
</script>

</head>
<body>

<!-- Intro Screen -->
<div id="intro">
    <h1>ROME</h1>
    <p>Gothic Apparel for the Eternal Night</p>
    <p id="enterPrompt">Press ENTER to enter</p>
</div>

<!-- Main Content -->
<div id="main">
    <div class="title">Vampire Sweaters</div>
    <div class="subtitle">Limited Midnight Collection</div>

    <div class="product-card">
        <p class="old-price">Original Price: $150</p>
        <p class="price">Now: $15</p>
        <p class="sale">90% OFF — Tonight Only</p>

        <button class="btn" onclick="showVideo()">VIEW LOOKBOOK</button>

        <div id="rickroll">
            <iframe 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&modestbranding=1&rel=0">
            </iframe>
        </div>
    </div>
</div>

</body>
</html>
